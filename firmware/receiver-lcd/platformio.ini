; ESP32-C3 ESP-NOW battery receiver with 16x2 I2C LCD

[env:esp32-c3-lcd-receiver]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
build_flags =
	-D ESP_NOW_WIFI_CHANNEL=1
	-D LCD_I2C_ADDR=0x27
	-I ../../shared
	-D LCD_COLUMNS=16
	-D LCD_SDA_PIN=8
	-D LCD_SCL_PIN=9
	-D LCD_PAGE_BUTTON_PIN=4
lib_deps =
	ArminJo/LCDBigNumbers@^1.2.3

[env:esp32-c3-lcd-pages-test]
extends = env:esp32-c3-lcd-receiver
build_flags =
	${env:esp32-c3-lcd-receiver.build_flags}
	-D LCD_STANDALONE_TEST
