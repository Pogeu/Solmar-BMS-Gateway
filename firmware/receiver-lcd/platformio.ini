; ESP32-S3 ESP-NOW battery receiver with 128x64 SPI display

[env:esp32-s3-lcd-receiver]
platform = espressif32
board = esp32-s3-devkitm-1
framework = arduino
monitor_speed = 115200
build_flags =
	-D ESP_NOW_WIFI_CHANNEL=1
	-I ../../shared
	-D DISPLAY_SPI_SCK_PIN=18
	-D DISPLAY_SPI_MOSI_PIN=23
	-D DISPLAY_CS_PIN=15
	-D DISPLAY_DC_PIN=16
	-D DISPLAY_RESET_PIN=17
	-D DISPLAY_PAGE_BUTTON_PIN=4
lib_deps =
	olikraus/U8g2

[env:esp32-s3-lcd-pages-test]
extends = env:esp32-s3-lcd-receiver
build_flags =
	${env:esp32-s3-lcd-receiver.build_flags}
	-D LCD_STANDALONE_TEST
