; PlatformIO Project Configuration File
;
; Gateway firmware: RS485 Modbus input, ESP-NOW battery broadcast output.
; MQTT/WiFi infrastructure publishing is intentionally not part of the active
; firmware. See TODO.md for possible future integrations.

[platformio]
default_envs = esp32-c3-gateway

[env:esp32-c3-gateway]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 9600
build_flags =
	-D SERIAL_ONLY_MODE=1
	-D ESP_NOW_ENABLE=1
	-D ESP_NOW_WIFI_CHANNEL=1
	-I ../../shared
	-D RS485_RX_PIN=0
	-D RS485_DE_RE_PIN=1
	-D RS485_TX_PIN=2

[env:espnow-packet-test]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 9600
test_framework = unity
test_build_src = no
build_flags =
	-D SERIAL_ONLY_MODE=1
	-D ESP_NOW_ENABLE=1
	-D ESP_NOW_WIFI_CHANNEL=1
	-I ../../shared

[env:esp32-c3-gateway-lcd-direct]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 9600
build_flags =
	-D SERIAL_ONLY_MODE=1
	-D ESP_NOW_ENABLE=0
	-D BMS_LCD_DIRECT_MODE=1
	-I ../../shared
	-D RS485_RX_PIN=0
	-D RS485_DE_RE_PIN=1
	-D RS485_TX_PIN=2
	-D LCD_I2C_ADDR=0x27
	-D LCD_COLUMNS=16
	-D LCD_SDA_PIN=8
	-D LCD_SCL_PIN=9
	-D LCD_PAGE_BUTTON_PIN=4
lib_deps =
	ArminJo/LCDBigNumbers@^1.2.3
