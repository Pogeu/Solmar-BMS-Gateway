; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 9600
build_flags =
	-D SERIAL_ONLY_MODE=0
	-D ESP_NOW_ENABLE=1
	-D ESP_NOW_WIFI_CHANNEL=1
	-I ../../shared
	-D RS485_RX_PIN=5
	-D RS485_TX_PIN=4
	-D RS485_DE_PIN=16
	-D RS485_RE_PIN=17
lib_deps = 
	me-no-dev/AsyncTCP
	mathieucarbou/ESPAsyncWebServer @ 3.4.5
	knolleary/PubSubClient@^2.8
	ayushsharma82/WebSerial@^2.1.1
	plerup/EspSoftwareSerial@^8.2.0

[platformio]
default_envs = esp32-c3-serial

[env:esp32-c3-serial]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 9600
build_flags =
	-D SERIAL_ONLY_MODE=1
	-D ESP_NOW_ENABLE=1
	-D ESP_NOW_WIFI_CHANNEL=1
	-I ../../shared
	-D RS485_RX_PIN=0
	-D RS485_DE_RE_PIN=1
	-D RS485_TX_PIN=2
lib_deps =
	plerup/EspSoftwareSerial@^8.2.0

[env:espnow-packet-test]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 9600
test_framework = unity
test_build_src = no
build_flags =
	-D SERIAL_ONLY_MODE=1
	-D ESP_NOW_ENABLE=1
	-D ESP_NOW_WIFI_CHANNEL=1
	-I ../../shared
lib_deps =
	plerup/EspSoftwareSerial@^8.2.0
