; PlatformIO Project Configuration File
;
; Gateway firmware: RS485 Modbus input with ESP-NOW, SPI display, microSD, and MQTT
; telemetry options.

[platformio]
default_envs = esp32-s3-gateway

[env:esp32-s3-gateway]
platform = espressif32
board = esp32-s3-devkitm-1
framework = arduino
monitor_speed = 9600
build_flags =
	-D SERIAL_ONLY_MODE=1
	-D ESP_NOW_ENABLE=1
	-D ESP_NOW_WIFI_CHANNEL=1
	-I ../../shared
	-D RS485_RX_PIN=0
	-D RS485_DE_RE_PIN=1
	-D RS485_TX_PIN=2

[env:espnow-packet-test]
platform = espressif32
board = esp32-s3-devkitm-1
framework = arduino
monitor_speed = 9600
test_framework = unity
test_build_src = no
build_flags =
	-D SERIAL_ONLY_MODE=1
	-D ESP_NOW_ENABLE=1
	-D ESP_NOW_WIFI_CHANNEL=1
	-I ../../shared

[env:esp32-s3-gateway-lcd-direct]
platform = espressif32
board = esp32-s3-devkitm-1
framework = arduino
monitor_speed = 9600
build_flags =
	-D SERIAL_ONLY_MODE=1
	-D ESP_NOW_ENABLE=0
	-D BMS_LCD_DIRECT_MODE=1
	-D SD_LOG_ENABLE=1
	-I ../../shared
	-D RS485_RX_PIN=0
	-D RS485_DE_RE_PIN=1
	-D RS485_TX_PIN=2
	-D DISPLAY_SPI_SCK_PIN=4
	-D DISPLAY_SPI_MOSI_PIN=6
	-D DISPLAY_CS_PIN=15
	-D DISPLAY_DC_PIN=16
	-D DISPLAY_RESET_PIN=17
	-D DISPLAY_PAGE_BUTTON_PIN=10
	-D SD_LOG_USE_DEFAULT_SPI_PINS=0
	-D SD_LOG_CS_PIN=7
	-D SD_LOG_SCK_PIN=4
	-D SD_LOG_MISO_PIN=5
	-D SD_LOG_MOSI_PIN=6
	-D BMS_MQTT_ENABLE=1
	-D BMS_MQTT_HOST=\"broker.hivemq.com\"
	-D BMS_MQTT_PORT=1883
	-D BMS_MQTT_TOPIC_BASE=\"solmar/bms/felicity-fla12171\"
	-D BMS_WIFI_AP_NAME=\"Solmar-BMS-Setup\"
	-D BMS_WIFI_CONFIG_PORTAL_TIMEOUT_SECONDS=120
lib_deps =
	olikraus/U8g2
	tzapu/WiFiManager@^2.0.17
	knolleary/PubSubClient@^2.8

[env:esp32-s3-gateway-display-test]
platform = espressif32
board = esp32-s3-devkitm-1
framework = arduino
monitor_speed = 9600
build_flags =
	-D SERIAL_ONLY_MODE=1
	-D ESP_NOW_ENABLE=0
	-D BMS_LCD_DIRECT_MODE=1
	-D BMS_DISPLAY_STANDALONE_TEST=1
	-D DISPLAY_CONTRAST=70
	-D DISPLAY_FILLED_PROGRESS_BAR=0
	-D DISPLAY_USE_ERC12864_ALT=1
	-I ../../shared
	-D DISPLAY_SPI_SCK_PIN=4
	-D DISPLAY_SPI_MOSI_PIN=6
	-D DISPLAY_CS_PIN=15
	-D DISPLAY_DC_PIN=16
	-D DISPLAY_RESET_PIN=17
	-D DISPLAY_PAGE_BUTTON_PIN=10
lib_deps =
	olikraus/U8g2
